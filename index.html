<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv Trading Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📈 Deriv Trading Platform</h1>
            <div class="connection-status" id="connectionStatus">
                ⚫ Disconnected
            </div>
        </header>

        <!-- Dashboard -->
        <div class="dashboard">
            <!-- Account Info -->
            <div class="card account-card">
                <h3>Account Balance</h3>
                <div class="balance" id="balance">$0.00</div>
                <div class="account-id" id="accountId">Not logged in</div>
                <div class="currency" id="currency">USD</div>
            </div>

            <!-- Market Data -->
            <div class="card market-card">
                <h3>Market Data</h3>
                <div class="symbol-selector">
                    <label for="symbol">Symbol:</label>
                    <select id="symbol">
                        <option value="R_10">Volatility 10 Index</option>
                        <option value="R_25">Volatility 25 Index</option>
                        <option value="R_50">Volatility 50 Index</option>
                        <option value="R_75">Volatility 75 Index</option>
                        <option value="R_100">Volatility 100 Index</option>
                        <option value="1HZ10V">1HZ10V Index</option>
                    </select>
                </div>
                <div class="current-price" id="currentPrice">Loading...</div>
                <div class="last-updated" id="lastUpdated">-</div>
            </div>

            <!-- Trading Form -->
            <div class="card trade-card">
                <h3>Place Trade</h3>
                <div class="form-group">
                    <label for="tradeType">Trade Type:</label>
                    <select id="tradeType">
                        <option value="CALL">📈 Call (Price Up)</option>
                        <option value="PUT">📉 Put (Price Down)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">Amount ($):</label>
                    <input type="number" id="amount" value="10" min="1" step="1">
                </div>
                <div class="form-group">
                    <label for="duration">Duration (minutes):</label>
                    <input type="number" id="duration" value="5" min="1" max="60">
                </div>
                <button id="tradeButton" class="trade-btn">🚀 Place Trade</button>
                <div id="tradeMessage" class="trade-message"></div>
            </div>

            <!-- Active Trades -->
            <div class="card trades-card">
                <h3>Active Trades</h3>
                <div id="activeTradesList">
                    <p class="empty-message">No active trades</p>
                </div>
            </div>

            <!-- Connection Controls -->
            <div class="card connection-card">
                <h3>Connection</h3>
                <button id="connectButton" class="connect-btn">🔌 Connect to Deriv</button>
                <button id="disconnectButton" class="disconnect-btn">❌ Disconnect</button>
                <p class="info-text">Make sure you have a Deriv account with demo money</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
